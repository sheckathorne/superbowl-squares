<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Superbowl Squares</title>
        <link type="text/css" href="dist/output.css" rel="stylesheet" />
    </head>
    <body class="min-h-screen bg-gray-200">
        <!-- Welcome Box -->
        <div
            id="welcome-box"
            class="flex items-center justify-center min-h-screen p-4"
        >
            <div
                class="bg-white rounded-xl shadow-lg p-12 flex flex-col items-center gap-6"
            >
                <h1 class="text-4xl font-bold text-gray-800">
                    Superbowl Squares
                </h1>
                <button
                    id="start-button"
                    class="px-8 py-4 text-white text-xl font-bold bg-green-500 rounded-lg hover:bg-green-600 transition-colors duration-200 shadow-lg"
                >
                    Start
                </button>
            </div>
        </div>
        <div id="add-player-parent">
            <div
                id="add-player-section"
                class="flex items-center justify-center min-h-screen"
            >
                <div id="add-player-subsection" class="w-full max-w-md">
                    <form
                        id="add-player-form"
                        class="bg-white rounded-xl shadow-lg p-12 mb-6"
                    >
                        <div class="mb-6">
                            <div class="mb-6">
                                <label
                                    class="block text-gray-800 text-lg font-bold mb-3"
                                    for="player-name"
                                >
                                    Player Name
                                </label>
                                <input
                                    class="w-full px-4 py-3 text-gray-700 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-colors duration-200 shadow"
                                    id="player-name"
                                    name="player-name"
                                    type="text"
                                    placeholder="Enter player name"
                                />
                            </div>
                            <div class="mb-6">
                                <label
                                    class="block text-gray-800 text-lg font-bold mb-3"
                                    for="player-name"
                                >
                                    Number of Squares
                                </label>
                                <input
                                    class="w-full px-4 py-3 text-gray-700 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-colors duration-200 shadow"
                                    id="square-count"
                                    name="square-count"
                                    type="number"
                                    max="100"
                                    min="1"
                                    placeholder="Enter square count, up to 100"
                                />
                            </div>
                            <div class="flex gap-4">
                                <button
                                    type="submit"
                                    class="px-6 py-3 text-white text-lg font-bold bg-green-500 rounded-lg hover:bg-green-600 transition-colors duration-200 shadow-lg"
                                >
                                    Add
                                </button>
                            </div>
                        </div>
                        <div id="players-list" class="mb-4"></div>
                    </form>
                    <p class="text-center text-gray-500 text-sm">
                        &copy;2025 Fuxie Industries. All rights reserved.
                    </p>
                </div>
            </div>
        </div>

        <!-- Game board -->
        <div id="game-board-parent">
            <div class="flex items-center justify-center min-h-screen">
                <div
                    class="bg-white rounded-xl shadow-lg p-12 flex flex-col items-center gap-6"
                >
                    <div class="flex flex-col items-center">
                        <!-- Top Label -->
                        <div class="text-xl font-bold">Eagles</div>
                        <div class="flex relative">
                            <!-- Left Label -->
                            <div
                                class="absolute -left-12 top-1/2 translate-y-[100%] text-xl font-bold rotate-[-90deg]"
                            >
                                Chiefs
                            </div>
                            <!-- Grid -->
                            <div
                                class="superbowl-grid flex flex-col items-center justify-center"
                            >
                                <div class="grid grid-cols-11 gap-1 ml-4"></div>
                            </div>
                        </div>
                        <div id="game-board-player-list" class="my-4"></div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="dist/index.js"></script>
    </body>
</html>
